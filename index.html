<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Rural - Animales y Producción</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🌾 Gestión Rural de Animales 🌾</h1>

    <!-- Sección principal -->
    <section id="animales-principales">
        <h2>Animales principales</h2>
        <ul>
            <li>🐄 Vacas</li>
            <li>🐎 Caballos</li>
            <li>🐖 Cerdos</li>
            <li>🐓 Gallinas</li>
        </ul>
    </section>

    <!-- Sección secundaria -->
    <section id="otros-animales">
        <h2>Otros animales comunes</h2>
        <ul>
            <li>🐑 Ovejas</li>
            <li>🦆 Patos</li>
            <li>🐐 Cabras</li>
            <li>🦃 Pavos</li>
            <li>🐇 Conejos</li>
        </ul>
    </section>

    <!-- Calculadora -->
    <section id="calculos">
        <h2>Calculadora Ganadera</h2>
        <form id="formGanadero">
            <label>Número de vacas:</label>
            <input type="number" id="numVacas" required><br>

            <label>Litros por vaca:</label>
            <input type="number" id="litrosPorVaca" step="0.01" required><br>

            <label>Precio por litro:</label>
            <input type="number" id="precioPorLitro" step="0.01" required><br>

            <label>Gastos diarios:</label>
            <input type="number" id="gastosDiarios" step="0.01" required><br>

            <button type="submit">Calcular</button>
        </form>

        <div id="resultados"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
