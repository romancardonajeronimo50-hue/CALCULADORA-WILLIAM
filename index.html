<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Rural - Animales y Producción</title>
    <link rel="stylesheet" href="style.css">
    <!-- Librería Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>🌾 Gestión Rural de Animales 🌾</h1>

    <!-- Sección de selección de animal -->
    <section id="seleccion-animal">
        <h2>Seleccione el animal</h2>
        <form id="formAnimal">
            <label for="animal">Animal:</label>
            <select id="animal" required>
                <option value="">-- Elija uno --</option>
                <option value="vaca">🐄 Vaca</option>
                <option value="gallina">🐓 Gallina</option>
                <option value="cerdo">🐖 Cerdo</option>
                <option value="oveja">🐑 Oveja</option>
                <option value="cabra">🐐 Cabra</option>
                <option value="pato">🦆 Pato</option>
                <option value="pavo">🦃 Pavo</option>
                <option value="conejo">🐇 Conejo</option>
                <option value="caballo">🐎 Caballo</option>
            </select>
            <button type="submit">Seleccionar</button>
        </form>
        <div id="animalSeleccionado"></div>
    </section>

    <!-- Calculadora -->
    <section id="calculos">
        <h2>Calculadora Ganadera</h2>
        <form id="formGanadero">
            <label id="labelCantidad">Número de animales:</label>
            <input type="number" id="numAnimales" required><br>

            <label id="labelProduccion">Producción por animal:</label>
            <input type="number" id="produccionPorAnimal" step="0.01" required><br>

            <label id="labelPrecio">Precio por unidad:</label>
            <input type="number" id="precioPorUnidad" step="0.01" required><br>

            <label>Gastos diarios:</label>
            <input type="number" id="gastosDiarios" step="0.01" required><br>

            <button type="submit">Calcular</button>
        </form>

        <div id="resultados"></div>
        <!-- Gráfica -->
        <canvas id="graficaResultados" width="400" height="200"></canvas>
    </section>

    <script>
        // Diccionario de unidades según el animal
        const unidadesPorAnimal = {
            vaca: "litros de leche",
            gallina: "huevos",
            cerdo: "kilos de carne",
            oveja: "litros de leche",
            cabra: "litros de leche",
            pato: "huevos",
            pavo: "huevos",
            conejo: "kilos de carne",
            caballo: "litros de leche"
        };

        let animalSeleccionado = "";

        // Selección de animal
        document.getElementById("formAnimal").addEventListener("submit", function(e) {
            e.preventDefault();
            animalSeleccionado = document.getElementById("animal").value;
            const animalDiv = document.getElementById("animalSeleccionado");

            if (animalSeleccionado) {
                const unidad = unidadesPorAnimal[animalSeleccionado];
                animalDiv.innerHTML = `<h3>Has seleccionado: ${animalSeleccionado} 🐾</h3>
                                       <p>La producción se medirá en <strong>${unidad}</strong>.</p>`;

                // Cambiar etiquetas dinámicamente
                document.getElementById("labelProduccion").textContent = `Producción por ${animalSeleccionado} (${unidad}):`;
                document.getElementById("labelPrecio").textContent = `Precio por ${unidad}:`;
            }
        });

        // Calculadora Ganadera
        document.getElementById("formGanadero").addEventListener("submit", function(e) {
            e.preventDefault();

            const numAnimales = parseInt(document.getElementById("numAnimales").value);
            const produccionPorAnimal = parseFloat(document.getElementById("produccionPorAnimal").value);
            const precioPorUnidad = parseFloat(document.getElementById("precioPorUnidad").value);
            const gastosDiarios = parseFloat(document.getElementById("gastosDiarios").value);

            const produccionTotal = numAnimales * produccionPorAnimal;
            const ingresos = produccionTotal * precioPorUnidad;
            const ganancia = ingresos - gastosDiarios;

            const unidad = unidadesPorAnimal[animalSeleccionado] || "unidades";

            // Estadísticas adicionales
            const promedioProduccion = produccionTotal / numAnimales;
            const rentabilidad = (ganancia / ingresos) * 100;

            // Resultados en texto
            const resultadosDiv = document.getElementById("resultados");
            resultadosDiv.innerHTML = `
                <h3>✨ Resultados ✨</h3>
                <p>Producción total: <strong>${produccionTotal.toFixed(2)} ${unidad}</strong></p>
                <p>Ingresos: <strong>$${ingresos.toFixed(2)}</strong></p>
                <p>Ganancia neta: <strong>$${ganancia.toFixed(2)}</strong></p>
                <hr>
                <p>Promedio por ${animalSeleccionado}: <strong>${promedioProduccion.toFixed(2)} ${unidad}</strong></p>
                <p>Rentabilidad: <strong>${rentabilidad.toFixed(2)}%</strong></p>
            `;

            // Gráfica con Chart.js
            const ctx = document.getElementById("graficaResultados").getContext("2d");
            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: ["Producción", "Ingresos", "Ganancia"],
                    datasets: [{
                        label: "Estadísticas Ganaderas",
                        data: [produccionTotal, ingresos, ganancia],
                        backgroundColor: ["#66bb6a", "#42a5f5", "#ff7043"]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        title: { display: true, text: "Resultados en Gráfica" }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                precision: 0
                            }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
